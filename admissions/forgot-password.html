<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Benchmark BTC Admissions</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:#fff;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#003366;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
background:#003366;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

button:hover{
background:#0055aa;
}

.message{
display:none;
margin-top:20px;
padding:12px;
border-radius:6px;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

.timer{
margin-top:15px;
text-align:center;
font-weight:bold;
display:none;
}

.back{
text-align:center;
margin-top:20px;
}

.back a{
color:#003366;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Forgot Password</h1>

<p>
Enter your registered email address or phone number.
An OTP will be sent via SMS and Email.
</p>

<form id="forgotForm">

<label>Email Address or Phone Number</label>

<input
type="text"
id="identity"
name="identity"
placeholder="Email or Phone Number"
required>

<button type="submit">
Send OTP
</button>

</form>

<div id="success" class="message success"></div>
<div id="error" class="message error"></div>

<div id="timer" class="timer">
Resend available in 60 seconds
</div>

<div class="back">
<a href="login.html">Back to Login</a>
</div>

</div>

<script>

let countdown;
let seconds = 60;

document.getElementById("forgotForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const identity =
document.getElementById("identity").value.trim();

const success =
document.getElementById("success");

const error =
document.getElementById("error");

success.style.display = "none";
error.style.display = "none";

try{

const formData = new FormData();
formData.append("identity", identity);

const response = await fetch(
"api/send-reset-otp.php",
{
method: "POST",
body: formData
}
);

const result = await response.json();

if(result.status){

success.innerText =
"OTP sent successfully. Check your SMS and Email.";

success.style.display = "block";

startTimer();

localStorage.setItem(
"reset_identity",
identity
);

setTimeout(function(){

window.location.href =
"verify-reset-otp.html";

},3000);

}else{

error.innerText =
result.message || "Unable to send OTP";

error.style.display = "block";

}

}catch(ex){

error.innerText =
"Server connection failed.";

error.style.display = "block";

}

});

function startTimer(){

const timer =
document.getElementById("timer");

timer.style.display = "block";

seconds = 60;

clearInterval(countdown);

countdown = setInterval(function(){

seconds--;

timer.innerHTML =
"Resend available in " +
seconds +
" seconds";

if(seconds <= 0){

clearInterval(countdown);

timer.innerHTML =
"Resend OTP";

}

},1000);

}

</script>

</body>
</html>
