<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | Benchmark BTC Admissions</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#003366;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-top:5px;
}

button{
width:100%;
padding:14px;
margin-top:25px;
background:#003366;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0055aa;
}

.message{
display:none;
margin-top:20px;
padding:12px;
border-radius:6px;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}
</style>
</head>

<body>

<div class="container">

<h1>Reset Password</h1>

<p>Enter the OTP sent to your email/phone and create a new password.</p>

<form id="resetForm">

<label>OTP Code</label>
<input type="text" id="otp" placeholder="Enter OTP" required>

<label>New Password</label>
<input type="password" id="newPassword" placeholder="New Password" required>

<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<button type="submit">Reset Password</button>
</form>

<div id="success" class="message success">
Password reset successful. Redirecting to login...
</div>

<div id="error" class="message error">
Invalid OTP or passwords do not match.
</div>

</div>

<script>

document.getElementById("resetForm")
.addEventListener("submit", function(e){

e.preventDefault();

const otp = document.getElementById("otp").value;
const newPassword = document.getElementById("newPassword").value;
const confirmPassword = document.getElementById("confirmPassword").value;

const savedOtp = localStorage.getItem("resetOTP");

const success = document.getElementById("success");
const error = document.getElementById("error");

if(!savedOtp){
error.style.display = "block";
success.style.display = "none";
return;
}

if(otp === savedOtp && newPassword === confirmPassword){

// update stored user (demo only)
let user = JSON.parse(localStorage.getItem("applicant"));

if(user){
user.password = newPassword;
localStorage.setItem("applicant", JSON.stringify(user));
}

localStorage.removeItem("resetOTP");

success.style.display = "block";
error.style.display = "none";

setTimeout(() => {
window.location.href = "login.html";
}, 3000);

}else{

success.style.display = "none";
error.style.display = "block";

}

});

</script>

</body>
</html>
