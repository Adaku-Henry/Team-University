<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise University Attendance Management System</title>
  <style>
    :root {
      --primary: #0f766e;
      --primary-dark: #115e59;
      --primary-soft: #ccfbf1;
      --secondary: #1e3a8a;
      --danger: #dc2626;
      --warning: #d97706;
      --success: #16a34a;
      --info: #2563eb;
      --dark: #0f172a;
      --muted: #64748b;
      --light: #f8fafc;
      --border: #e2e8f0;
      --card: #ffffff;
      --sidebar: #0f172a;
      --sidebar-soft: #1e293b;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #eef2f7;
      color: var(--dark);
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 290px;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
      position: fixed;
      inset: 0 auto 0 0;
      overflow-y: auto;
      padding: 22px 16px;
      z-index: 10;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 10px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 14px;
    }

    .brand-icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: var(--primary);
      display: grid;
      place-items: center;
      font-size: 24px;
      box-shadow: 0 10px 20px rgba(20,184,166,0.25);
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .brand span {
      color: #94a3b8;
      font-size: 12px;
    }

    .nav-group {
      margin-top: 14px;
    }

    .nav-title {
      color: #94a3b8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 12px 12px 8px;
    }

    .nav-btn {
      width: 100%;
      display: flex;
      gap: 10px;
      align-items: center;
      border: 0;
      background: transparent;
      color: #cbd5e1;
      padding: 12px 12px;
      border-radius: 13px;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .nav-btn:hover,
    .nav-btn.active {
      background: var(--sidebar-soft);
      color: white;
      transform: translateX(2px);
    }

    .main {
      margin-left: 290px;
      width: calc(100% - 290px);
      padding: 22px;
    }

    .topbar {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 16px;
      z-index: 5;
      margin-bottom: 20px;
    }

    .topbar h2 {
      margin: 0;
      font-size: 22px;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .content {
      display: grid;
      gap: 18px;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .metric-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 22px;
    }

    .metric strong {
      display: block;
      font-size: 28px;
      margin-top: 4px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      background: #e2e8f0;
      color: var(--dark);
      transition: 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-dark {
      background: var(--dark);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-warning {
      background: var(--warning);
      color: white;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-info {
      background: var(--info);
      color: white;
    }

    .btn-outline {
      background: white;
      border: 1px solid var(--border);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      font: inherit;
      background: white;
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15,118,110,0.12);
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }

    th,
    td {
      text-align: left;
      padding: 12px 13px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tr:hover td {
      background: #f8fafc;
    }

    .badge {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .badge-success {
      background: #dcfce7;
      color: #166534;
    }

    .badge-warning {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-info {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-dark {
      background: #e2e8f0;
      color: #334155;
    }

    .progress {
      height: 10px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      min-width: 90px;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--success);
    }

    .progress.warning span {
      background: var(--warning);
    }

    .progress.danger span {
      background: var(--danger);
    }

    canvas {
      width: 100%;
      height: 280px;
      background: #fff;
      border-radius: 16px;
    }

    .split {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .notice {
      padding: 14px;
      border-radius: 14px;
      background: #f0fdfa;
      border: 1px solid #99f6e4;
      color: #134e4a;
      font-size: 13px;
      line-height: 1.5;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      background: white;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      min-height: 92px;
      padding: 10px;
    }

    .day strong {
      display: block;
      margin-bottom: 8px;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .heat {
      height: 58px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
    }

    .mobile-toggle {
      display: none;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: var(--dark);
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      z-index: 999;
      display: none;
      max-width: 360px;
    }

    .workflow {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .workflow-step {
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--border);
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      .grid-4,
      .grid-3,
      .grid-2,
      .form-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .sidebar {
        transform: translateX(-100%);
        transition: 0.25s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
        width: 100%;
        padding: 14px;
      }

      .topbar {
        position: static;
        flex-direction: column;
        align-items: flex-start;
      }

      .mobile-toggle {
        display: inline-flex;
      }

      .grid-4,
      .grid-3,
      .grid-2,
      .form-row {
        grid-template-columns: 1fr;
      }

      .calendar,
      .heatmap {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media print {
      .sidebar,
      .topbar,
      .no-print,
      .btn {
        display: none !important;
      }

      .main {
        margin: 0;
        width: 100%;
      }

      .card {
        box-shadow: none;
        border: 1px solid #ccc;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">🎓</div>
        <div>
          <h1>University ERP</h1>
          <span>Attendance Management</span>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-title">Core Attendance</div>
        <button class="nav-btn active" data-page="dashboard">📊 Attendance Dashboard</button>
        <button class="nav-btn" data-page="take">✅ Take Attendance</button>
        <button class="nav-btn" data-page="register">📋 Attendance Register</button>
        <button class="nav-btn" data-page="history">🕘 Attendance History</button>
        <button class="nav-btn" data-page="calendar">📅 Attendance Calendar</button>
      </div>

      <div class="nav-group">
        <div class="nav-title">Monitoring</div>
        <button class="nav-btn" data-page="students">👨‍🎓 Student Attendance</button>
        <button class="nav-btn" data-page="lecturers">👨‍🏫 Lecturer Attendance</button>
        <button class="nav-btn" data-page="alerts">🚨 Low Attendance Alerts</button>
        <button class="nav-btn" data-page="eligibility">📝 Exam Eligibility</button>
        <button class="nav-btn" data-page="analytics">📈 Attendance Analytics</button>
      </div>

      <div class="nav-group">
        <div class="nav-title">Administration</div>
        <button class="nav-btn" data-page="reports">📑 Attendance Reports</button>
        <button class="nav-btn" data-page="appeals">📨 Attendance Appeals</button>
        <button class="nav-btn" data-page="workflow">🔐 Approval Workflow</button>
        <button class="nav-btn" data-page="policies">⚙️ Attendance Policies</button>
        <button class="nav-btn" data-page="exports">⬇️ Export Reports</button>
        <button class="nav-btn" data-page="settings">🛠️ Settings / Audit</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <button class="btn btn-dark mobile-toggle" onclick="toggleSidebar()">☰ Menu</button>
          <h2 id="pageTitle">Attendance Dashboard</h2>
          <p id="pageSubtitle">Enterprise attendance control center for lecturers, HODs, registrar, and administrators.</p>
        </div>
        <div class="top-actions no-print">
          <button class="btn btn-outline" onclick="syncOffline()">🔄 Sync Offline Data</button>
          <button class="btn btn-info" onclick="window.print()">🖨️ Print</button>
          <button class="btn btn-danger" onclick="resetDemo()">♻️ Reset Demo</button>
        </div>
      </div>

      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORE = "enterprise_university_attendance_v1";
    let db = {};
    let currentPage = "dashboard";
    let lastReportRows = [];

    const $ = (selector, parent = document) => parent.querySelector(selector);
    const $$ = (selector, parent = document) => Array.from(parent.querySelectorAll(selector));

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function addDays(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function uid(prefix) {
      return prefix + "_" + Math.random().toString(36).slice(2, 9) + "_" + Date.now().toString(36);
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function saveDB() {
      localStorage.setItem(STORE, JSON.stringify(db));
    }

    function loadDB() {
      const stored = localStorage.getItem(STORE);
      if (stored) {
        db = JSON.parse(stored);
      } else {
        seedDB();
      }
    }

    function seedDB() {
      db = {
        settings: {
          academicYear: "2025/2026",
          semester: "Semester II",
          faculty: "Faculty of Computing and Informatics",
          department: "Department of Information Technology",
          programme: "Bachelor of Information Technology",
          minimumAttendance: 75,
          latePenalty: 5,
          maxExcusedAbsences: 3,
          examEligibility: 75,
          attendanceGradeWeight: 10,
          autoBanBelowThreshold: true,
          offlineMode: true
        },
        lecturers: [
          { id: "L001", name: "Dr. Sarah Nambooze", department: "Information Technology", punctuality: 94, workload: 12, missed: 1 },
          { id: "L002", name: "Mr. David Kato", department: "Computer Science", punctuality: 90, workload: 10, missed: 2 },
          { id: "L003", name: "Dr. Grace Achieng", department: "Software Engineering", punctuality: 97, workload: 14, missed: 0 },
          { id: "L004", name: "Ms. Linda Namuli", department: "Information Systems", punctuality: 88, workload: 9, missed: 3 }
        ],
        courses: [
          { id: "C001", code: "BIT2201", name: "Database Systems", className: "BIT II", faculty: "Computing", department: "Information Technology", programme: "BIT", lecturerId: "L001", venue: "Computer Lab A", day: "Monday", time: "08:00", duration: "2 Hours" },
          { id: "C002", code: "BIT2202", name: "Computer Networks", className: "BIT II", faculty: "Computing", department: "Information Technology", programme: "BIT", lecturerId: "L002", venue: "Block B Room 12", day: "Tuesday", time: "10:00", duration: "2 Hours" },
          { id: "C003", code: "BCS3104", name: "Artificial Intelligence", className: "BCS III", faculty: "Computing", department: "Computer Science", programme: "BCS", lecturerId: "L003", venue: "Innovation Hall", day: "Wednesday", time: "14:00", duration: "3 Hours" },
          { id: "C004", code: "BIS2103", name: "Systems Analysis", className: "BIS II", faculty: "Computing", department: "Information Systems", programme: "BIS", lecturerId: "L004", venue: "Room ICT 4", day: "Thursday", time: "09:00", duration: "2 Hours" }
        ],
        students: [
          { id: "S001", regNo: "BIT001", name: "John Doe", className: "BIT II", programme: "BIT", department: "Information Technology", guardian: "parent1@example.com" },
          { id: "S002", regNo: "BIT002", name: "Mary Jane", className: "BIT II", programme: "BIT", department: "Information Technology", guardian: "parent2@example.com" },
          { id: "S003", regNo: "BIT003", name: "Peter Okello", className: "BIT II", programme: "BIT", department: "Information Technology", guardian: "parent3@example.com" },
          { id: "S004", regNo: "BIT004", name: "James Mukasa", className: "BIT II", programme: "BIT", department: "Information Technology", guardian: "parent4@example.com" },
          { id: "S005", regNo: "BIT005", name: "Amina Nsubuga", className: "BIT II", programme: "BIT", department: "Information Technology", guardian: "parent5@example.com" },
          { id: "S006", regNo: "BCS001", name: "Robert Ouma", className: "BCS III", programme: "BCS", department: "Computer Science", guardian: "parent6@example.com" },
          { id: "S007", regNo: "BCS002", name: "Irene Akello", className: "BCS III", programme: "BCS", department: "Computer Science", guardian: "parent7@example.com" },
          { id: "S008", regNo: "BCS003", name: "Daniel Mugisha", className: "BCS III", programme: "BCS", department: "Computer Science", guardian: "parent8@example.com" },
          { id: "S009", regNo: "BIS001", name: "Esther Nalubega", className: "BIS II", programme: "BIS", department: "Information Systems", guardian: "parent9@example.com" },
          { id: "S010", regNo: "BIS002", name: "Brian Kisekka", className: "BIS II", programme: "BIS", department: "Information Systems", guardian: "parent10@example.com" },
          { id: "S011", regNo: "BIS003", name: "Faith Namata", className: "BIS II", programme: "BIS", department: "Information Systems", guardian: "parent11@example.com" },
          { id: "S012", regNo: "BIS004", name: "Samuel Otieno", className: "BIS II", programme: "BIS", department: "Information Systems", guardian: "parent12@example.com" }
        ],
        venues: [
          { name: "Computer Lab A", capacity: 60 },
          { name: "Block B Room 12", capacity: 120 },
          { name: "Innovation Hall", capacity: 80 },
          { name: "Room ICT 4", capacity: 70 }
        ],
        sessions: [],
        attendance: [],
        appeals: [
          { id: "AP001", studentId: "S003", courseId: "C001", date: addDays(-2), reason: "I attended but was marked absent.", evidence: "Class photo submitted", status: "Lecturer Review" }
        ],
        reports: [],
        notifications: [],
        audit: [],
        pendingSync: []
      };

      const dates = [todayISO(), addDays(-1), addDays(-2), addDays(-3), addDays(-4), addDays(-7), addDays(-8), addDays(-10)];
      db.courses.forEach(course => {
        dates.forEach((date, index) => {
          const lecturer = getLecturer(course.lecturerId, true);
          const session = {
            id: uid("SESS"),
            courseId: course.id,
            date,
            time: course.time,
            venue: course.venue,
            duration: course.duration,
            lecturer: lecturer.name,
            academicYear: db.settings.academicYear,
            semester: db.settings.semester,
            approvalStage: index < 3 ? "Submitted" : "Final Archive",
            isMakeup: index === 5
          };
          db.sessions.push(session);

          db.students.filter(s => s.className === course.className).forEach((student, sIndex) => {
            const statuses = ["Present", "Present", "Present", "Late", "Absent", "Excused"];
            let status = statuses[(sIndex + index) % statuses.length];

            if (student.id === "S004" || student.id === "S003") {
              status = index % 2 === 0 ? "Absent" : "Late";
            }

            if (student.id === "S012") {
              status = index % 3 === 0 ? "Absent" : "Present";
            }

            db.attendance.push({
              id: uid("ATT"),
              sessionId: session.id,
              studentId: student.id,
              courseId: course.id,
              date,
              time: course.time,
              venue: course.venue,
              status,
              recordedBy: lecturer.name,
              lecturer: lecturer.name,
              className: course.className,
              approvedStage: session.approvalStage,
              modifiedAt: new Date().toISOString()
            });
          });
        });
      });

      generateNotifications();
      saveDB();
    }

    function init() {
      loadDB();
      bindNavigation();
      go(location.hash.replace("#", "") || "dashboard");
      window.addEventListener("hashchange", () => go(location.hash.replace("#", "") || "dashboard"));
    }

    function bindNavigation() {
      $$(".nav-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          go(btn.dataset.page);
          if (innerWidth < 760) toggleSidebar(false);
        });
      });
    }

    function go(page) {
      currentPage = page;
      location.hash = page;
      $$(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));

      const titles = {
        dashboard: ["Attendance Dashboard", "Real-time overview of classes, attendance rates, alerts, and trends."],
        take: ["Take Attendance", "Select course, class, lecture date, session time, then mark students present, absent, late, or excused."],
        register: ["Attendance Register", "Complete student attendance register with calculated percentages and status indicators."],
        history: ["Attendance History", "Search and filter previous attendance sessions and records."],
        calendar: ["Attendance Calendar", "Calendar view using Present, Absent, Late, and Excused attendance legends."],
        students: ["Student Attendance", "Individual student attendance profiles, warnings, forecasts, and certificates."],

    function toast(message) {
      const el = $("#toast");
      el.textContent = message;

      setTimeout(() => el.style.display = "none", 3200);
    }

    function getStudent(id) {
      return db.students.find(s => s.id === id) || {};
    }

    function getCourse(id) {
      return db.courses.find(c => c.id === id) || {};
    }

    function getLecturer(id, silent = false) {
      const lecturer = db.lecturers.find(l => l.id === id);
      return lecturer || { id: "", name: silent ? "Unknown Lecturer" : "Unknown Lecturer" };
    }

    function attendanceScore(status) {
      if (status === "Present") return 1;
      if (status === "Excused") return 1;
      if (status === "Late") return Math.max(0, 1 - Number(db.settings.latePenalty || 0) / 100);
      return 0;
    }

    function studentPercentage(studentId, courseId = "") {
      const records = db.attendance.filter(r => r.studentId === studentId && (!courseId || r.courseId === courseId));
      if (!records.length) return 0;
      const score = records.reduce((sum, r) => sum + attendanceScore(r.status), 0);
      return Math.round((score / records.length) * 100);
    }

    function courseRate(courseId) {
      const records = db.attendance.filter(r => r.courseId === courseId);
      if (!records.length) return 0;
      const score = records.reduce((sum, r) => sum + attendanceScore(r.status), 0);
      return Math.round((score / records.length) * 100);
    }

    function statusBadge(status) {
      const map = {
        Present: "badge-success",
        Absent: "badge-danger",
        Late: "badge-warning",
        Excused: "badge-info",
        Submitted: "badge-info",
        "HOD Review": "badge-warning",
        "Registrar Verification": "badge-info",
        "Final Archive": "badge-success",
        Approved: "badge-success",
        Rejected: "badge-danger",
        "Lecturer Review": "badge-warning"
      };
      return `<span class="badge ${map[status] || "badge-dark"}">${escapeHTML(status)}</span>`;
    }

    function riskInfo(pct) {
      const threshold = Number(db.settings.minimumAttendance);
      if (pct >= threshold) return { label: "Good", cls: "badge-success", progress: "" };
      if (pct >= 50) return { label: "Warning", cls: "badge-warning", progress: "warning" };
      return { label: "Critical", cls: "badge-danger", progress: "danger" };
    }

    function generateNotifications() {
      db.notifications = [];
      db.students.forEach(student => {
        const pct = studentPercentage(student.id);
        if (pct < Number(db.settings.minimumAttendance)) {
          db.notifications.push({
            id: uid("NOT"),
            type: "Low Attendance",
            studentId: student.id,
            message: `${student.name} is below ${db.settings.minimumAttendance}% attendance threshold. Current: ${pct}%.`,
            date: todayISO(),
            channel: "Portal / Email / SMS",
            sent: false
          });
        }

        const recent = db.attendance
          .filter(r => r.studentId === student.id)
          .sort((a, b) => b.date.localeCompare(a.date))
          .slice(0, 3);

        if (recent.length === 3 && recent.every(r => r.status === "Absent")) {
          db.notifications.push({
            id: uid("NOT"),
            type: "Consecutive Absence",
            studentId: student.id,
            message: `${student.name} missed 3 consecutive classes.`,
            date: todayISO(),
            channel: "Portal / Email / SMS",
            sent: false
          });
        }
      });
      saveDB();
    }

    function dashboardMetrics() {
      const today = todayISO();
      const todayRecords = db.attendance.filter(r => r.date === today);
      return {
        classes: db.sessions.length,
        records: db.attendance.length,
        presentToday: todayRecords.filter(r => r.status === "Present").length,
        absentToday: todayRecords.filter(r => r.status === "Absent").length,
        lateToday: todayRecords.filter(r => r.status === "Late").length,
        below: db.students.filter(s => studentPercentage(s.id) < Number(db.settings.minimumAttendance)).length,
        overall: db.attendance.length ? Math.round(db.attendance.reduce((sum, r) => sum + attendanceScore(r.status), 0) / db.attendance.length * 100) : 0
      };
    }

    function saveAttendance() {
      const course = getCourse($("#takeCourse").value);
      const date = $("#takeDate").value;
      const time = $("#takeTime").value;
      const venue = $("#takeVenue").value;
      const lecturer = $("#takeLecturer").value;
      const duration = $("#takeDuration").value;
      const isMakeup = $("#takeMakeup").value === "Yes";

      let session = db.sessions.find(s => s.courseId === course.id && s.date === date && s.time === time);

      if (!session) {
        session = {
          id: uid("SESS"),
          courseId: course.id,
          date,
          time,
          venue,
          duration,
          lecturer,
          academicYear: db.settings.academicYear,
          semester: db.settings.semester,
          approvalStage: "Submitted",
          isMakeup
        };
        db.sessions.push(session);
      } else {
        session.venue = venue;
        session.duration = duration;
        session.lecturer = lecturer;
        session.isMakeup = isMakeup;
      }

      $$(".attendance-status").forEach(select => {
        const studentId = select.dataset.student;
        const status = select.value;
        const commentInput = $(`.attendance-comment[data-student="${studentId}"]`);
        const existing = db.attendance.find(r => r.studentId === studentId && r.courseId === course.id && r.date === date && r.time === time);

        if (existing) {
          const old = existing.status;
          existing.status = status;
          existing.venue = venue;
          existing.lecturer = lecturer;
          existing.recordedBy = lecturer;
          existing.approvedStage = "Submitted";
          existing.comment = commentInput.value;
          existing.modifiedAt = new Date().toISOString();

          if (old !== status) {
            db.audit.unshift({
              id: uid("AUD"),
              user: lecturer,
              action: "Modified Attendance",
              oldValue: old,
              newValue: status,
              reason: commentInput.value || "Attendance update",
              date: new Date().toLocaleString(),
              student: getStudent(studentId).name,
              course: course.name
            });
          }
        } else {
          db.attendance.push({
            id: uid("ATT"),
            sessionId: session.id,
            studentId,
            courseId: course.id,
            date,
            time,
            venue,
            status,
            recordedBy: lecturer,
            lecturer,
            className: course.className,
            approvedStage: "Submitted",
            comment: commentInput.value,
            modifiedAt: new Date().toISOString()
          });
        }
      });

      db.pendingSync.push({
        id: uid("SYNC"),
        type: "Attendance Save",
        date: new Date().toLocaleString(),
        status: db.settings.offlineMode ? "Pending Local Sync" : "Online"
      });

      generateNotifications();
      saveDB();
      toast("Attendance saved successfully.");
      renderTakeAttendance();
    }

    function forecastAbsences(studentId) {
      const records = db.attendance.filter(r => r.studentId === studentId);
      const total = records.length;
      if (!total) return 0;
      const score = records.reduce((sum, r) => sum + attendanceScore(r.status), 0);
      const threshold = Number(db.settings.minimumAttendance) / 100;
      const canMiss = Math.floor((score / threshold) - total);
      return Math.max(0, canMiss);
    }

    function generateReport() {
      const type = $("#reportType").value;
      const courseId = $("#reportCourse").value;
      const from = $("#reportFrom").value;
      const to = $("#reportTo").value;

      let title = "";
      let headers = [];
      let rows = [];

      if (type === "student") {
        title = "Student Attendance Report";
        headers = ["Reg No", "Student", "Programme", "Attendance %", "Exam Eligible"];
        rows = db.students.map(s => {
          const pct = studentPercentage(s.id, courseId);
          return [s.regNo, s.name, s.programme, pct + "%", pct >= db.settings.examEligibility ? "Yes" : "No"];
        });
      }

      if (type === "course") {
        title = "Course Attendance Report";
        headers = ["Course Code", "Course", "Lecturer", "Class", "Attendance Rate"];
        rows = db.courses.filter(c => !courseId || c.id === courseId).map(c => [c.code, c.name, getLecturer(c.lecturerId).name, c.className, courseRate(c.id) + "%"]);
      }

      if (type === "department") {
        title = "Department Attendance Report";
        headers = ["Department", "Students", "Average Attendance"];
        const departments = [...new Set(db.students.map(s => s.department))];
        rows = departments.map(dep => {
          const students = db.students.filter(s => s.department === dep);
          const avg = students.length ? Math.round(students.reduce((sum, s) => sum + studentPercentage(s.id), 0) / students.length) : 0;
          return [dep, students.length, avg + "%"];
        });
      }

      if (type === "semester") {
        title = "Semester Attendance Summary";
        headers = ["Academic Year", "Semester", "Classes", "Records", "Overall Attendance"];
        const m = dashboardMetrics();
        rows = [[db.settings.academicYear, db.settings.semester, m.classes, m.records, m.overall + "%"]];
      }

      lastReportRows = [headers, ...rows];

      db.reports.unshift({
        id: uid("REP"),
        generatedDate: new Date().toLocaleString(),
        generatedBy: "Staff Portal User",
        reportType: title,
        filters: { courseId, from, to }
      });
      saveDB();

      $("#reportOutput").className = "";
      $("#reportOutput").innerHTML = `
        <div class="table-wrap">
          <table id="reportTable">
            <thead>
              <tr>${headers.map(h => `<th>${escapeHTML(h)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${rows.map(row => `<tr>${row.map(cell => `<td>${escapeHTML(cell)}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;

      toast(`${title} generated successfully.`);
    }

    function advanceWorkflow(sessionId) {
      const stages = ["Submitted", "HOD Review", "Registrar Verification", "Final Archive"];
      const session = db.sessions.find(s => s.id === sessionId);
      const current = stages.indexOf(session.approvalStage);
      const next = stages[Math.min(current + 1, stages.length - 1)];
      const old = session.approvalStage;
      session.approvalStage = next;
      db.attendance.filter(r => r.sessionId === sessionId).forEach(r => r.approvedStage = next);

      db.audit.unshift({
        id: uid("AUD"),
        user: "Approval Officer",
        action: "Advanced Attendance Workflow",
        oldValue: old,
        newValue: next,
        reason: "Approval process",
        date: new Date().toLocaleString(),
        course: getCourse(session.courseId).name
      });

      saveDB();
      toast(`Workflow advanced to ${next}.`);
      renderWorkflow();
    }

    function downloadBlob(content, fileName, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      toast(`${fileName} downloaded.`);
    }

    function drawBarChart(canvasId, labels, values, title) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = "#0f172a";
      ctx.font = "bold 18px Arial";
      ctx.fillText(title, 25, 30);

      const max = 100;
      const chartX = 50;
      const chartY = 55;
      const chartW = w - 80;
      const chartH = h - 100;
      const barGap = 20;
      const barW = Math.max(32, (chartW - barGap * values.length) / values.length);

      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i++) {
        const y = chartY + chartH - (chartH / 5) * i;
        ctx.beginPath();
        ctx.moveTo(chartX, y);
        ctx.lineTo(chartX + chartW, y);
        ctx.stroke();
        ctx.fillStyle = "#64748b";
        ctx.font = "12px Arial";
        ctx.fillText((i * 20) + "%", 8, y + 4);
      }

      values.forEach((value, i) => {
        const x = chartX + i * (barW + barGap) + 10;
        const barH = (value / max) * chartH;
        const y = chartY + chartH - barH;
        ctx.fillStyle = value >= db.settings.minimumAttendance ? "#0f766e" : value >= 50 ? "#d97706" : "#dc2626";
        roundRect(ctx, x, y, barW, barH, 10);
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 12px Arial";
        ctx.fillText(value + "%", x + 4, y - 8);
        ctx.fillStyle = "#334155";
        ctx.font = "12px Arial";
        ctx.fillText(labels[i], x, h - 25);
      });
    }

    function drawLineChart(canvasId, series, title) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = "#0f172a";
      ctx.font = "bold 18px Arial";
      ctx.fillText(title, 25, 30);

      const chartX = 55;
      const chartY = 55;
      const chartW = w - 90;
      const chartH = h - 100;

      ctx.strokeStyle = "#e2e8f0";
      for (let i = 0; i <= 5; i++) {
        const y = chartY + chartH - (chartH / 5) * i;
        ctx.beginPath();
        ctx.moveTo(chartX, y);
        ctx.lineTo(chartX + chartW, y);
        ctx.stroke();
        ctx.fillStyle = "#64748b";
        ctx.font = "12px Arial";
        ctx.fillText((i * 20) + "%", 10, y + 4);
      }

      const points = series.map((item, i) => ({
        x: chartX + (series.length === 1 ? 0 : i * (chartW / (series.length - 1))),
        y: chartY + chartH - (item.value / 100) * chartH,
        label: item.label,
        value: item.value
      }));

      ctx.strokeStyle = "#0f766e";
      ctx.lineWidth = 4;
      ctx.beginPath();
      points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.stroke();

      points.forEach(p => {
        ctx.fillStyle = p.value >= db.settings.minimumAttendance ? "#0f766e" : "#dc2626";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 12px Arial";
        ctx.fillText(p.value + "%", p.x - 12, p.y - 12);

        ctx.fillStyle = "#334155";
        ctx.font = "12px Arial";
        ctx.fillText(p.label, p.x - 16, h - 25);
      });
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }
