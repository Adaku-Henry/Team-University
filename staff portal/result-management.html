<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result Management System</title>

  <style>
    :root {
      --primary: #123c69;
      --secondary: #0b7285;
      --success: #2f9e44;
      --danger: #c92a2a;
      --warning: #f08c00;
      --info: #1971c2;
      --dark: #1f2937;
      --light: #f8fafc;
      --muted: #64748b;
      --border: #dbe3ef;
      --card: #ffffff;
      --bg: #eef3f9;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--dark);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--primary);
      color: white;
      font-weight: 700;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button.secondary {
      background: var(--secondary);
    }

    button.success {
      background: var(--success);
    }

    button.danger {
      background: var(--danger);
    }

    button.warning {
      background: var(--warning);
      color: #111827;
    }

    button.info {
      background: var(--info);
    }

    button.light {
      background: #e2e8f0;
      color: #111827;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(11, 114, 133, 0.12);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 11px;
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      background: #edf2f7;
      color: #334155;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tr:hover td {
      background: #f8fafc;
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(18, 60, 105, 0.93), rgba(11, 114, 133, 0.88)),
        url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      padding: 20px;
    }

    .login-card {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: white;
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-info {
      padding: 44px;
      background: linear-gradient(135deg, #123c69, #0b7285);
      color: white;
    }

    .login-info h1 {
      font-size: 36px;
      line-height: 1.1;
      margin-bottom: 18px;
    }

    .login-info p {
      opacity: 0.9;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .login-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .login-badges span {
      background: rgba(255, 255, 255, 0.14);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }

    .login-form {
      padding: 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .login-form h2 {
      color: var(--primary);
      margin-bottom: 6px;
    }

    .demo-box {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      color: #334155;
      font-size: 14px;
      line-height: 1.7;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      background: #0f2438;
      color: white;
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      margin-bottom: 18px;
    }

    .brand-logo {
      width: 45px;
      height: 45px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4dabf7, #63e6be);
      display: grid;
      place-items: center;
      color: #082032;
      font-weight: 900;
      font-size: 20px;
    }

    .brand h2 {
      font-size: 18px;
      line-height: 1.1;
    }

    .brand small {
      color: #a7b5c5;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      background: transparent;
      color: #dbeafe;
      text-align: left;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
    }

    .nav button.active,
    .nav button:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: none;
    }

    .nav button.locked {
      color: #64748b;
      cursor: not-allowed;
    }

    .main {
      padding: 22px;
      min-width: 0;
    }

    .topbar {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 14px;
    }

    .topbar h1 {
      font-size: 22px;
      color: var(--primary);
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      overflow: hidden;
    }

    .card h2,
    .card h3 {
      color: var(--primary);
      margin-bottom: 12px;
    }

    .stat {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-left: 6px solid var(--secondary);
    }

    .stat strong {
      font-size: 30px;
      color: var(--primary);
    }

    .stat span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      color: #475569;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.draft {
      background: #e2e8f0;
      color: #334155;
    }

    .badge.submitted {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .badge.review {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.approved {
      background: #dcfce7;
      color: #166534;
    }

    .badge.rejected {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.published {
      background: #ccfbf1;
      color: #115e59;
    }

    .badge.locked {
      background: #111827;
      color: white;
    }

    .alert {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      background: #f8fafc;
      line-height: 1.6;
    }

    .alert.success {
      background: #dcfce7;
      color: #166534;
      border-color: #86efac;
    }

    .alert.danger {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .alert.warning {
      background: #fef3c7;
      color: #92400e;
      border-color: #fde68a;
    }

    .alert.info {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .mini {
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bar {
      height: 12px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      min-width: 130px;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--secondary), #63e6be);
      border-radius: 999px;
    }

    .distribution {
      display: grid;
      gap: 10px;
    }

    .dist-row {
      display: grid;
      grid-template-columns: 60px 1fr 40px;
      gap: 10px;
      align-items: center;
      font-weight: 700;
    }

    .audit-item,
    .notif-item {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      background: white;
      line-height: 1.5;
    }

    .audit-item small,
    .notif-item small {
      color: var(--muted);
      display: block;
      margin-top: 4px;
    }

    .print-area {
      background: white;
      color: #111827;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .transcript-head {
      text-align: center;
      border-bottom: 2px solid #111827;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .watermark {
      position: relative;
    }

    .watermark:after {
      content: "UNIVERSITY ERP";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 52px;
      font-weight: 900;
      color: rgba(0, 0, 0, 0.035);
      pointer-events: none;
      transform: rotate(-20deg);
    }

    .hidden {
      display: none !important;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #printable,
      #printable * {
        visibility: visible;
      }

      #printable {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        box-shadow: none;
        border: none;
      }

      .no-print {
        display: none !important;
      }
    }

    @media (max-width: 1000px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        height: auto;
        position: static;
      }

      .form-grid,
      .grid-2,
      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .login-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const STORE_KEY = "enterprise_university_result_system_v1";

    const state = {
      db: null,
      user: JSON.parse(sessionStorage.getItem("activeUser") || "null"),
      tab: "dashboard",
      message: "",
      selectedBatchId: null
    };

    function uid(prefix) {
      return prefix + "_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function now() {
      return new Date().toLocaleString();
    }

    function seedDB() {
      return {
        users: [
          { id: "u1", username: "lecturer1", password: "1234", name: "Dr. Ada Johnson", role: "Lecturer", department: "Computer Science" },
          { id: "u2", username: "hod1", password: "1234", name: "Prof. Michael Smith", role: "HOD", department: "Computer Science" },
          { id: "u3", username: "admin1", password: "1234", name: "ERP Administrator", role: "Admin", department: "Registry" }
        ],
        students: [
          { id: "s1", regNo: "CSC/2021/001", name: "Amara Okafor", department: "Computer Science", level: "300" },
          { id: "s2", regNo: "CSC/2021/002", name: "Daniel Musa", department: "Computer Science", level: "300" },
          { id: "s3", regNo: "CSC/2021/003", name: "Fatima Bello", department: "Computer Science", level: "300" },
          { id: "s4", regNo: "CSC/2021/004", name: "John Mensah", department: "Computer Science", level: "300" },
          { id: "s5", regNo: "CSC/2021/005", name: "Grace Adeyemi", department: "Computer Science", level: "300" },
          { id: "s6", regNo: "CSC/2021/006", name: "Samuel Eze", department: "Computer Science", level: "300" },
          { id: "s7", regNo: "CSC/2021/007", name: "Aisha Lawal", department: "Computer Science", level: "300" },
          { id: "s8", regNo: "CSC/2021/008", name: "Peter Nwankwo", department: "Computer Science", level: "300" }
        ],
        courses: [
          { id: "c1", code: "CSC301", title: "Database Systems", credit: 3, semester: "First Semester", department: "Computer Science", lecturerId: "u1", hodId: "u2" },
          { id: "c2", code: "CSC305", title: "Software Engineering", credit: 3, semester: "First Semester", department: "Computer Science", lecturerId: "u1", hodId: "u2" },
          { id: "c3", code: "CSC312", title: "Computer Networks", credit: 2, semester: "Second Semester", department: "Computer Science", lecturerId: "u1", hodId: "u2" }
        ],
        enrollments: [
          { courseId: "c1", studentId: "s1" }, { courseId: "c1", studentId: "s2" }, { courseId: "c1", studentId: "s3" }, { courseId: "c1", studentId: "s4" },
          { courseId: "c1", studentId: "s5" }, { courseId: "c1", studentId: "s6" }, { courseId: "c1", studentId: "s7" }, { courseId: "c1", studentId: "s8" },
          { courseId: "c2", studentId: "s1" }, { courseId: "c2", studentId: "s2" }, { courseId: "c2", studentId: "s3" }, { courseId: "c2", studentId: "s4" },
          { courseId: "c2", studentId: "s5" }, { courseId: "c2", studentId: "s6" },
          { courseId: "c3", studentId: "s1" }, { courseId: "c3", studentId: "s2" }, { courseId: "c3", studentId: "s7" }, { courseId: "c3", studentId: "s8" }
        ],
        batches: [],
        notifications: [],
        audit: []
      };
    }

    function loadDB() {
      const saved = localStorage.getItem(STORE_KEY);
      state.db = saved ? JSON.parse(saved) : seedDB();
      saveDB();
    }

    function saveDB() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state.db));
    }

    function notify(text, type = "info") {
      state.db.notifications.unshift({
        id: uid("n"),
        text,
        type,
        user: state.user ? state.user.name : "System",
        time: now(),
        read: false
      });
      saveDB();
    }

    function audit(action, details = "") {
      state.db.audit.unshift({
        id: uid("a"),
        action,
        details,
        user: state.user ? state.user.name : "System",
        role: state.user ? state.user.role : "System",
        time: now()
      });
      saveDB();
    }

    function setMessage(msg, type = "info") {
      state.message = `<div class="alert ${type}">${msg}</div>`;
    }

    function gradeEngine(total) {
      if (total >= 80) return { grade: "A", point: 5.0, remark: "Excellent", status: "Pass" };
      if (total >= 70) return { grade: "B", point: 4.0, remark: "Very Good", status: "Pass" };
      if (total >= 60) return { grade: "C", point: 3.0, remark: "Good", status: "Pass" };
      if (total >= 50) return { grade: "D", point: 2.0, remark: "Pass", status: "Pass" };
      if (total >= 40) return { grade: "E", point: 1.0, remark: "Weak Pass", status: "Pass" };
      return { grade: "F", point: 0.0, remark: "Fail", status: "Fail" };
    }

    function getCourse(id) {
      return state.db.courses.find(c => c.id === id);
    }

    function getStudent(id) {
      return state.db.students.find(s => s.id === id);
    }

    function getUser(id) {
      return state.db.users.find(u => u.id === id);
    }

    function userCourses() {
      if (!state.user) return [];
      if (state.user.role === "Lecturer") return state.db.courses.filter(c => c.lecturerId === state.user.id);
      if (state.user.role === "HOD") return state.db.courses.filter(c => c.hodId === state.user.id);
      return state.db.courses;
    }

    function batchStatusClass(status) {
      return String(status || "Draft").toLowerCase().replace(/\s/g, "");
    }

    function statusBadge(status, locked) {
      return `<span class="badge ${batchStatusClass(status)}">${status}</span>${locked ? ' <span class="badge locked">Locked</span>' : ""}`;
    }

    function enrolledStudents(courseId) {
      const ids = state.db.enrollments.filter(e => e.courseId === courseId).map(e => e.studentId);
      return state.db.students.filter(s => ids.includes(s.id));
    }

    function findOrCreateBatch(courseId, semester, year) {
      let batch = state.db.batches.find(b => b.courseId === courseId && b.semester === semester && b.academicYear === year);
      if (!batch) {
        const course = getCourse(courseId);
        batch = {
          id: uid("b"),
          courseId,
          semester,
          academicYear: year,
          department: course.department,
          lecturerId: course.lecturerId,
          hodId: course.hodId,
          status: "Draft",
          locked: false,
          version: 1,
          comments: [],
          createdAt: now(),
          updatedAt: now(),
          results: enrolledStudents(courseId).map(s => ({
            studentId: s.id,
            ca: "",
            exam: "",
            total: "",
            grade: "",
            point: "",
            remark: "",
            status: "Missing"
          })),
          versions: []
        };
        state.db.batches.push(batch);
        audit("Created result batch", `${course.code} ${semester} ${year}`);
        saveDB();
      }
      return batch;
    }

    function validateBatch(batch) {
      const errors = [];
      const seen = new Set();

      batch.results.forEach(r => {
        const student = getStudent(r.studentId);
        if (seen.has(r.studentId)) errors.push(`Duplicate entry detected for ${student.regNo}`);
        seen.add(r.studentId);

        const caEmpty = r.ca === "" || r.ca === null || r.ca === undefined;
        const examEmpty = r.exam === "" || r.exam === null || r.exam === undefined;

        if (caEmpty || examEmpty) errors.push(`Missing marks for ${student.regNo}`);

        const ca = Number(r.ca);
        const exam = Number(r.exam);

        if (!caEmpty && (isNaN(ca) || ca < 0 || ca > 40)) errors.push(`CA must be 0–40 for ${student.regNo}`);
        if (!examEmpty && (isNaN(exam) || exam < 0 || exam > 60)) errors.push(`Exam must be 0–60 for ${student.regNo}`);
        if (!caEmpty && !examEmpty && ca + exam > 100) errors.push(`Total cannot exceed 100 for ${student.regNo}`);
      });

      return errors;
    }

    function recalcBatch(batch) {
      batch.results.forEach(r => {
        if (r.ca === "" || r.exam === "") {
          r.total = "";
          r.grade = "";
          r.point = "";
          r.remark = "";
          r.status = "Missing";
          return;
        }

        const total = Number(r.ca) + Number(r.exam);
        const g = gradeEngine(total);
        r.total = total;
        r.grade = g.grade;
        r.point = g.point;
        r.remark = g.remark;
        r.status = g.status;
      });
      batch.updatedAt = now();
    }

    function metrics(batch) {
      const complete = batch.results.filter(r => r.total !== "");
      const totalStudents = batch.results.length;
      const missing = batch.results.filter(r => r.status === "Missing").length;
      const avg = complete.length ? complete.reduce((a, r) => a + Number(r.total), 0) / complete.length : 0;
      const pass = complete.filter(r => r.status === "Pass").length;
      const fail = complete.filter(r => r.status === "Fail").length;

      const dist = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
      complete.forEach(r => {
        if (dist[r.grade] !== undefined) dist[r.grade]++;
      });

      const totals = complete.map(r => Number(r.total));
      const suspicious = [];
      if (missing > 0) suspicious.push(`${missing} missing mark(s)`);
      if (complete.length >= 4) {
        const sameScores = new Set(totals);
        if (sameScores.size <= 2) suspicious.push("Suspicious pattern: many identical scores");
      }
      if (complete.length && fail / complete.length > 0.5) suspicious.push("High failure rate above 50%");
      if (complete.some(r => Number(r.total) > 95)) suspicious.push("Very high score detected, review recommended");

      return {
        totalStudents,
        complete: complete.length,
        missing,
        avg,
        pass,
        fail,
        passRate: complete.length ? (pass / complete.length) * 100 : 0,
        failRate: complete.length ? (fail / complete.length) * 100 : 0,
        dist,
        suspicious
      };
    }

    function calculateStudentGPA(studentId) {
      const published = state.db.batches.filter(b => b.status === "Published");
      let units = 0;
      let weighted = 0;
      const rows = [];

      published.forEach(b => {
        const r = b.results.find(x => x.studentId === studentId);
        if (!r || r.total === "") return;

        const course = getCourse(b.courseId);
        units += course.credit;
        weighted += Number(r.point) * course.credit;

        rows.push({
          course,
          batch: b,
          result: r,
          quality: Number(r.point) * course.credit
        });
      });

      return {
        rows,
        units,
        gpa: units ? weighted / units : 0
      };
    }

      }

      if (state.user.role === "HOD") {
        return ["Submitted", "Under Review"].includes(batch.status);
      }

      return state.user.role === "Admin";
    }

    function updateMark(studentId, field, value) {
      const batch = selectedBatch();
      if (!canEditBatch(batch)) return;

      r[field] = value === "" ? "" : Number(value);
      recalcBatch(batch);
      saveDB();

    function snapshotVersion(batch, label) {
      batch.versions.push({
        version: batch.version,
        label,
        time: now(),
        by: state.user.name,
        results: JSON.parse(JSON.stringify(batch.results))
      });
    }

    function saveDraft() {
      const batch = selectedBatch();
      if (!batch) return setMessage("No batch selected.", "danger"), renderShell();

      if (!canEditBatch(batch)) {
        setMessage("This result batch is locked or not editable at this workflow stage.", "danger");
        return renderShell();
      }

      recalcBatch(batch);
      const errors = validateBatch(batch).filter(e => !e.includes("Missing marks"));

      if (errors.length) {
        setMessage(errors.slice(0, 6).join("<br>"), "danger");
        return renderShell();
      }

      batch.status = batch.status === "Rejected" ? "Draft" : batch.status;
      batch.version += 1;
      snapshotVersion(batch, "Draft saved");
      saveDB();
      audit("Saved result draft", `${getCourse(batch.courseId).code} v${batch.version}`);
      notify("Result draft saved successfully", "success");
      setMessage("Draft saved successfully.", "success");
      renderShell();
    }

    function submitResults() {
      const batch = selectedBatch();
      if (!batch) return;

      if (state.user.role !== "Lecturer" && state.user.role !== "Admin") {
        setMessage("Only Lecturer or Admin can submit results.", "danger");
        return renderShell();
      }

      if (!["Draft", "Rejected"].includes(batch.status)) {
        setMessage("Only Draft or Rejected results can be submitted.", "danger");
        return renderShell();
      }

      recalcBatch(batch);
      const errors = validateBatch(batch);

      if (errors.length) {
        setMessage(`<b>Fix validation errors before submission:</b><br>${errors.slice(0, 10).join("<br>")}`, "danger");
        return renderShell();
      }

      batch.status = "Submitted";
      batch.locked = true;
      batch.version += 1;
      snapshotVersion(batch, "Submitted to HOD");
      saveDB();

      audit("Submitted results to HOD", `${getCourse(batch.courseId).code} ${batch.semester}`);
      notify("Results submitted successfully. Pending approval by HOD.", "success");
      setMessage("Results submitted to HOD successfully. Editing is now locked.", "success");
      renderShell();
    }

    function approveByHOD() {
      const b = selectedBatch();
      const comment = document.getElementById("hodComment")?.value.trim() || "Approved by HOD";

      const errors = validateBatch(b);
      if (errors.length) {
        setMessage(errors.slice(0, 8).join("<br>"), "danger");
        return renderShell();
      }

      b.status = "Approved";
      b.locked = true;
      b.version += 1;
      b.comments.push({ by: state.user.name, text: comment, time: now(), type: "approval" });
      snapshotVersion(b, "Approved by HOD");
      saveDB();

      audit("HOD approved results", `${getCourse(b.courseId).code}`);
      notify("Results approved by HOD. Pending admin final publishing.", "success");
      setMessage("Results approved and forwarded to Admin.", "success");
      renderShell();
    }

    function rejectByHOD() {
      const b = selectedBatch();
      const comment = document.getElementById("hodComment")?.value.trim();

      if (!comment) {
        alert("Please enter rejection reason.");
        return;
      }

      b.status = "Rejected";
      b.locked = false;
      b.version += 1;
      b.comments.push({ by: state.user.name, text: comment, time: now(), type: "rejection" });
      snapshotVersion(b, "Rejected by HOD");
      saveDB();

      audit("HOD rejected results", `${getCourse(b.courseId).code}: ${comment}`);
      notify("Results rejected with comments. Lecturer correction required.", "danger");
      setMessage("Results rejected and returned to lecturer.", "warning");
      renderShell();
    }

      b.locked = true;
      b.version += 1;
      snapshotVersion(b, "Published by Admin");

      b.locked = false;
      b.version += 1;
      b.comments.push({ by: state.user.name, text: "Admin unlock: " + reason, time: now(), type: "unlock" });

      audit("Admin unlocked published result", `${getCourse(b.courseId).code}: ${reason}`);

    function departmentSummary() {
      const published = state.db.batches.filter(b => b.status === "Published");
      if (!published.length) return `<div class="alert warning">No published results yet.</div>`;

      const dept = {};

      published.forEach(b => {
        const m = metrics(b);
        if (!dept[b.department]) dept[b.department] = { batches: 0, avg: 0, passRate: 0 };
        dept[b.department].batches++;
        dept[b.department].avg += m.avg;
        dept[b.department].passRate += m.passRate;
      });

      return Object.entries(dept).map(([name, d]) => `
        <div class="alert info">
          <b>${name}</b><br>
          Published Batches: ${d.batches}<br>
          Average Score: ${(d.avg / d.batches).toFixed(2)}<br>
          Average Pass Rate: ${(d.passRate / d.batches).toFixed(2)}%
        </div>
      `).join("");
    }

    function exportSelectedBatchCSV() {
      const id = document.getElementById("reportBatch").value;
      if (!id) return alert("Select a batch first.");

      const b = state.db.batches.find(x => x.id === id);
      const c = getCourse(b.courseId);

      let csv = "Reg No,Name,Course,CA,Exam,Total,Grade,Point,Status,Remark\\n";
      b.results.forEach(r => {
        const s = getStudent(r.studentId);
        csv += `${s.regNo},${s.name},${c.code},${r.ca},${r.exam},${r.total},${r.grade},${r.point},${r.status},${r.remark}\\n`;
      });

      downloadFile(`${c.code}_${b.semester}_result.csv`, csv);
      audit("Exported CSV report", c.code);
    }

    function downloadCSVTemplate() {
      const batch = selectedBatch();
      if (!batch) return alert("Load a course first.");

      let csv = "regNo,ca,exam\\n";
      batch.results.forEach(r => {
        const s = getStudent(r.studentId);
        csv += `${s.regNo},,\\n`;
      });

      downloadFile("result_upload_template.csv", csv);
    }

    function downloadFile(filename, content) {
      const blob = new Blob([content], { type: "text/csv" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importCSV() {
      const file = document.getElementById("csvFile").files[0];
      const batch = selectedBatch();

      if (!file) return alert("Choose a CSV file first.");
      if (!batch) return alert("Load a batch first.");
      if (!canEditBatch(batch)) return alert("This batch is not editable.");

      const reader = new FileReader();
      reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.split(/\r?\n/).filter(Boolean);
        const header = lines.shift().toLowerCase().replace(/\s/g, "");

        if (header !== "regno,ca,exam") {
          alert("Invalid CSV header. Use: regNo,ca,exam");
          return;
        }

        let imported = 0;

        lines.forEach(line => {
          const [regNo, ca, exam] = line.split(",").map(x => x.trim());
          const student = state.db.students.find(s => s.regNo === regNo);
          if (!student) return;

          const r = batch.results.find(x => x.studentId === student.id);
          if (!r) return;

          r.ca = ca === "" ? "" : Number(ca);
          r.exam = exam === "" ? "" : Number(exam);
          imported++;
        });

        recalcBatch(batch);

        const errors = validateBatch(batch).filter(e => !e.includes("Missing marks"));
        if (errors.length) {
          alert("Imported with validation errors:\\n" + errors.slice(0, 8).join("\\n"));
        }

        saveDB();
        audit("Imported CSV marks", `${imported} rows imported`);
        notify(`${imported} CSV result rows imported`, "success");
        renderEntryTable();
      };
      reader.readAsText(file);
    }
