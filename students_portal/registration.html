<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="reg-container">

  <!-- HEADER -->
  <div class="reg-header">
    <h1>Course Registration Portal</h1>
    <p>Register your courses for the semester</p>
  </div>

  <!-- PROGRESS -->
  <div class="steps">
    <div class="step active">1. Academic Info</div>
    <div class="step">2. Registration Type</div>
    <div class="step">3. Select Courses</div>
    <div class="step">4. Review</div>
    <div class="step">5. Submit</div>
  </div>

  <!-- STEP 1 -->
  <div class="step-box" id="step1">
    <h2>Academic Information</h2>

    <select id="year">
      <option>2025/2026</option>
      <option>2024/2025</option>
    </select>

    <select id="semester">
      <option>Semester 1</option>
      <option>Semester 2</option>
    </select>

    <select id="yearOfStudy">
      <option>Year 1</option>
      <option>Year 2</option>
      <option>Year 3</option>
      <option>Year 4</option>
    </select>

    <button onclick="nextStep(2)">Next</button>
  </div>

  <!-- STEP 2 -->
  <div class="step-box hidden" id="step2">
    <h2>Registration Type</h2>

    <select id="regType">
      <option>Normal Registration</option>
      <option>Retake Registration</option>
      <option>Missing Paper</option>
      <option>Supplementary</option>
    </select>

    <button onclick="nextStep(3)">Next</button>
  </div>

  <!-- STEP 3 (ENHANCED) -->
  <div class="step-box hidden" id="step3">

    <h2>Course Management</h2>

   <div class="add-course">
  <input id="courseCode" placeholder="Course Code (e.g BIT401)">
  <input id="courseName" placeholder="Course Name">
  <input id="courseCredits" type="number" placeholder="Credits">

  <button type="button" onclick="addCourse()">Add Course</button>
</div>

    <!-- SEARCH -->
    <input id="searchCourse" placeholder="Search course..." onkeyup="filterCourses()">

    <!-- COURSE LIST -->
    <div id="courseList"></div>

    <p><strong>Total Credits:</strong> <span id="totalCredits">0</span></p>
    <p id="warning"></p>

    <button onclick="nextStep(4)">Next</button>
  </div>

  <!-- STEP 4 -->
  <div class="step-box hidden" id="step4">
    <h2>Review Registration</h2>
    <div id="summary"></div>
    <button onclick="nextStep(5)">Submit Registration</button>
  </div>

  <!-- STEP 5 -->
  <div class="step-box hidden" id="step5">
    <h2>Registration Complete</h2>
    <p id="regSlip"></p>
    <button onclick="downloadSlip()">Download Slip</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
