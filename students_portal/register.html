<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
}

.container{

width:500px;

margin:auto;

margin-top:30px;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}

input,select{

width:100%;

padding:12px;

margin:10px 0;

border:1px solid #ddd;

border-radius:8px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

button{

width:100%;

padding:12px;

background:#2563eb;

border:none;

color:white;

border-radius:8px;

}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form>

<div class="grid">

<input placeholder="First Name">

<input placeholder="Last Name">

</div>

<input placeholder="Student ID">

<input placeholder="Email">

<select>

<option>Select Role</option>

<option>Student</option>

<option>Lecturer</option>

<option>Admin</option>

</select>

<input type="password"
placeholder="Password">

<input type="password"
placeholder="Confirm Password">

<button>
    <ul class="nav-links">

        <a href="login.html">

Register

</a>
    </ul>


</button>

</form>

</div>

</body>
</html>
