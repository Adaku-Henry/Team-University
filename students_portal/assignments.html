<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignments - LMS</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* =========================
   BASE LAYOUT
========================= */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #f4f7fb;
}

.student-layout {
    display: flex;
    min-height: 100vh;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
    width: 250px;
    background: #0f172a;
    color: white;
    padding: 20px;
    position: fixed;
    height: 100%;
}

.sidebar h2 {
    color: #38bdf8;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 6px;
    margin: 5px 0;
}

.sidebar a:hover,
.sidebar a.active {
    background: #1e3c72;
    color: white;
}

/* =========================
   MAIN
========================= */
.main {
    margin-left: 250px;
    padding: 25px;
    width: 100%;
}

h1 {
    margin-bottom: 5px;
}

/* =========================
   STATS
========================= */
.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin: 15px 0;
}

.stat-box {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

/* =========================
   GRID
========================= */
.assignment-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* =========================
   CARD
========================= */
.assignment-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.assignment-card h3 {
    color: #1e3c72;
}

/* =========================
   DROP ZONE
========================= */
.drop-zone {
    border: 2px dashed #2563eb;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    background: #f8fafc;
}

.drop-zone.dragover {
    background: #dbeafe;
}

/* =========================
   STATUS
========================= */
.status {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    display: inline-block;
}

.pending {
    background: #fff3cd;
    color: #856404;
}

.submitted {
    background: #d1e7dd;
    color: #0f5132;
}

/* =========================
   BUTTON
========================= */
button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* =========================
   PANEL
========================= */
.panel {
    margin-top: 25px;
    background: white;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="student-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>TEAM LMS</h2>

        <a href="#" class="active"><i class="fa fa-tasks"></i> Assignments</a>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <h1>Assignments Center</h1>
        <p>Track submissions in real-time</p>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-box">
                <h3 id="total">3</h3>
                <p>Total</p>
            </div>

            <div class="stat-box">
                <h3 id="pending">3</h3>
                <p>Pending</p>
            </div>

            <div class="stat-box">
                <h3 id="submitted">0</h3>
                <p>Submitted</p>
            </div>
        </div>

        <!-- ASSIGNMENTS -->
        <div class="assignment-grid">

            <!-- CARD -->
            <div class="assignment-card" data-title="Web Development" data-deadline="2026-07-20">

                <h3>Web Development Assignment</h3>
                <p>Deadline: <span class="countdown"></span></p>

                <span class="status pending">Pending</span>

                <div class="drop-zone">
                    <p>Drag & Drop or Click</p>
                    <input type="file" hidden>
                </div>

                <button>Submit</button>
            </div>

            <!-- CARD -->
            <div class="assignment-card" data-title="Database" data-deadline="2026-07-25">

                <h3>Database Project</h3>
                <p>Deadline: <span class="countdown"></span></p>

                <span class="status pending">Pending</span>

                <div class="drop-zone">
                    <p>Drag & Drop or Click</p>
                    <input type="file" hidden>
                </div>

                <button>Submit</button>
            </div>

        </div>

        <!-- SUBMISSIONS -->
        <div class="panel">
            <h2>Submission History</h2>
            <ul id="history"></ul>
        </div>

    </main>

</div>

<script>
// =========================
// LOCAL STORAGE
// =========================
let data = JSON.parse(localStorage.getItem("assignments")) || [];

// =========================
// DROP ZONE
// =========================
document.querySelectorAll(".drop-zone").forEach(zone => {

    let input = zone.querySelector("input");

    zone.onclick = () => input.click();

    input.onchange = () => {
        zone.innerHTML = input.files[0].name;
        zone.dataset.file = input.files[0].name;
    };

    zone.ondragover = e => {
        e.preventDefault();
        zone.classList.add("dragover");
    };

    zone.ondragleave = () => zone.classList.remove("dragover");

    zone.ondrop = e => {
        e.preventDefault();
        zone.classList.remove("dragover");

        let file = e.dataTransfer.files[0];
        zone.innerHTML = file.name;
        zone.dataset.file = file.name;
    };
});

// =========================
// SUBMIT
// =========================
document.querySelectorAll("button").forEach(btn => {
    btn.onclick = function () {

        let card = this.parentElement;
        let file = card.querySelector(".drop-zone").dataset.file;

        if (!file) {
            alert("Upload file first");
            return;
        }

        let title = card.dataset.title;

        card.querySelector(".status").textContent = "Submitted";
        card.querySelector(".status").classList.remove("pending");
        card.querySelector(".status").classList.add("submitted");

        data.push({ title, file, time: new Date().toLocaleString() });
        localStorage.setItem("assignments", JSON.stringify(data));

        load();
        updateStats();
    };
});

// =========================
// LOAD HISTORY
// =========================
function load() {
    let list = document.getElementById("history");
    list.innerHTML = "";

    data.forEach(d => {
        let li = document.createElement("li");
        li.textContent = `${d.title} - ${d.file} (${d.time})`;
        list.appendChild(li);
    });
}

// =========================
// STATS
// =========================
function updateStats() {
    document.getElementById("submitted").innerText = data.length;
    document.getElementById("pending").innerText = 2 - data.length;
}

// =========================
// COUNTDOWN
// =========================
document.querySelectorAll(".assignment-card").forEach(card => {

    let deadline = new Date(card.dataset.deadline);
    let span = card.querySelector(".countdown");

    setInterval(() => {
        let now = new Date();
        let diff = deadline - now;

        let days = Math.floor(diff / (1000 * 60 * 60 * 24));

        span.innerText = days + " days left";
    }, 1000);
});

load();
updateStats();
</script>

</body>
</html>
